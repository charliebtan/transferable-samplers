# @package _global_
#
defaults:
  - override /hydra/launcher: submitit_slurm

hydra:
  launcher:
    partition: h100
    cpus_per_task: 16
    qos: medium
    time: 23:59:59
    mem_gb: 24
    gres: gpu:1
    timeout_min: 1000
    array_parallelism: 2 # max num of tasks to run in parallel (via job array)
    setup:
      - "conda activate fast-tgb"
