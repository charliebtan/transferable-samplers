# @package _global_
#
defaults:
  - override /hydra/launcher: submitit_slurm

hydra:
  launcher:
    partition: main,long
    cpus_per_task: 4
    mem_gb: 48
    gres: gpu:1
    timeout_min: 300
    array_parallelism: 100 # max num of tasks to run in parallel (via job array)
    exclude: cn-b[001-005],cn-e[002-003]
    setup:
      - "module purge"
      - "module load miniconda/3"
      - "module load cudatoolkit/12.4"
      - "micromamba activate tbg3"
