_target_: src.data.tetra_peptide_datamodule.TetraPeptideDataModule
data_dir: ${paths.data_dir}4aa
huggingface_repo_id: "microsoft/timewarp"
huggingface_train_data_dir: "4AA-large/train"
huggingface_val_data_dir: "4AA-large/val"
batch_size: 512 # Needs to be divisible by the number of devices (e.g., if in a distributed setup)
num_workers: 2
pin_memory: False
num_aa: 4
num_dimensions: 3
num_particles: 52       # Max number of particles + at least a single padding token
dim: 156                # num_dimensions * num_particles 
energy_hist_config:
  x_min: -200
  x_max: -100
  ylim: 0.1
num_val_sequences: 20
