_target_: src.data.transferable_peptide_datamodule.TransferablePeptideDataModule
data_dir: ${paths.data_dir}
num_dimensions: 3
num_atoms: 178       # Max number of atoms + at least a single padding token
num_aa_max: 8
standardization_factor: 0.35 # Standardization factor for normalization
val_sequences: null # Override to use a specific set of sequences for validation
test_sequences: null # Override to use a specific set of sequences for testing
batch_size: 512 # Needs to be divisible by the number of devices (e.g., if in a distributed setup)
num_workers: 2
pin_memory: False