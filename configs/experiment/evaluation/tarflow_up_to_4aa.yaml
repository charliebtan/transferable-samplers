# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /data: up_to_4aa
  - override /trainer: gpu

ckpt_path: null
train: False
val: False
test: True
task_name: eval

model:
  eval_seq_name: null
  sampling_config:
    use_com_adjustment: True
    batch_size: 5_000
    num_test_proposal_samples: 10_000
    num_smc_samples: 10_000
    clip_reweighting_logits: 0.002
  net:
    _target_: src.models.components.tarflow.tarflow.TarFlow
    in_channels: 3
    channels: 384
    num_blocks: 8
    layers_per_block: 8
    perm_type: "standard"
    use_adapt_ln: False
    use_transition: False
    pos_embed_type: "learned"
    cond_embed:
      _target_: src.models.components.tarflow.embed.ConditionalEmbedder
      channels: ${model.net.channels}

  smc_sampler:
    enabled: False
    langevin_eps: 1e-7
    num_timesteps: 100
    batch_size: 1024 # set for 48gb 
    input_energy_cutoff: 100 # this might need tuning if you get NaNs!
    do_energy_plots: True
    
data:
  batch_size: 128
  num_eval_samples: 10_000

trainer:
  limit_test_batches: 1
  limit_val_batches: 1
