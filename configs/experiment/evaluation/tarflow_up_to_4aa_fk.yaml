# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /data: up_to_4aa
  - override /trainer: gpu

ckpt_path: null
train: False
val: True
test: False
task_name: eval

model:
  sampling_config:
    use_com_adjustment: True
    batch_size: 10_000
    num_proposal_samples: 10_000
    num_test_proposal_samples: 10_000
    num_smc_samples: 10_000
    clip_reweighting_logits: 0.002
  net:
    _target_: src.models.components.tarflow.tarflow_old.TarFlow
    in_channels: 3
    channels: 384
    num_blocks: 8
    layers_per_block: 8
    use_qkln: True
    cond_embed:
      _target_: src.models.components.tarflow.embed.ConditionalEmbedder
      channels: ${model.net.channels}

  smc_sampler:
    _target_: src.models.components.smc.fk_sampler.FeynmannKacSampler
    enabled: True
    langevin_eps: 1e-5
    num_timesteps: 100
    ess_threshold: 0.5
    systematic_resampling: True
    batch_size: 256 # set for 48gb
    input_energy_cutoff: 100 # this might need tuning if you get NaNs!
    do_energy_plots: True
    log_freq: 1
    
data:
  batch_size: 10_000
  num_eval_samples: 10_000

trainer:
  limit_test_batches: 1
  limit_val_batches: 1