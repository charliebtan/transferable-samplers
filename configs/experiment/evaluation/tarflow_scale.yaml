# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /data: scale
  - override /trainer: gpu

ckpt_path: "/network/scratch/m/majdi.hassan/self-consume-bg/self-consume-bg/logs/train/runs/tarflow_up_to_8aa_v3/checkpoints/last.ckpt"
train: False
val: False
test: True
task_name: eval

model:
  eval_seq_name: ["YQNPDGSQA","GYDPETGTWG"]
  sampling_config:
    use_com_adjustment: True
    batch_size: 2_500
    num_test_proposal_samples: 250_000
    num_smc_samples: 10_000
    clip_reweighting_logits: 0.002 # it was working well on AC without - lets try avoid
  net:
    _target_: src.models.neural_networks.tarflow.tarflow.TarFlow
    in_channels: 3
    channels: 384
    num_blocks: 8
    layers_per_block: 8
    perm_type: "standard"
    use_adapt_ln: False
    use_transition: False
    pos_embed_type: "sinusoidal"
    cond_embed:
      _target_: src.models.neural_networks.embed.ConditionalEmbedder
      channels: ${model.net.channels}

  smc_sampler:
    _target_: src.models.samplers.mala_sampler.SMCSamplerMALA
    enabled: False

data:
  batch_size: 128
  num_eval_samples: 10_000

trainer:
  limit_test_batches: 1
  limit_val_batches: 1
