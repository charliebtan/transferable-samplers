# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /data: up_to_4aa
  - override /trainer: gpu

ckpt_path: "/network/scratch/m/majdi.hassan/self-consume-bg/self-consume-bg/logs/train/runs/tarflow_up_to_4aa_v2/checkpoints/last.ckpt"
train: False
val: False
test: True

task_name: eval

model:
  eval_seq_name: null
  sampling_config:
    use_com_adjustment: True
    batch_size: 10_000
    num_proposal_samples: 10_000
    num_test_proposal_samples: 10_000
    num_smc_samples: 10_000
    clip_reweighting_logits: 0.002 # it was working well on AC without - lets try avoid
  net:
    _target_: src.models.components.tarflow.tarflow.TarFlow
    in_channels: 3
    channels: 384
    num_blocks: 8
    layers_per_block: 8
    use_qkln: True
    cond_embed:
      _target_: src.models.components.tarflow.embed.ConditionalEmbedder
      channels: ${model.net.channels}

  smc_sampler:
    _target_: src.models.components.smc.mala_sampler.SMCSamplerMALA
    enabled: True
    langevin_eps: 1e-5
    num_timesteps: 100
    ess_threshold: 1.0
    adaptive_step_size: True
    systematic_resampling: True
    warmup: 0.
    batch_size: 256 # set for 48gb
    input_energy_cutoff: 100 # this might need tuning if you get NaNs!
    do_energy_plots: True
    log_freq: 1

data:
  batch_size: 10_000
  num_eval_samples: 10_000

trainer:
  limit_test_batches: 1
  limit_val_batches: 1
