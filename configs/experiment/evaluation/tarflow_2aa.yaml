# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /data: 2aa
  - override /trainer: gpu

ckpt_path: null
train: False

model:
  use_com_energy: 1
  sampling_config:
    batch_size: 10_000
    num_test_proposal_samples: 10_000
    num_smc_samples: 10_000
    clip_reweighting_logits: 0.002 # ideally we can remove this
  net:
    in_channels: 3
    channels: 384
    num_blocks: 6
    layers_per_block: 6
    cond_embed:
      _target_: src.models.components.tarflow.embed.ConditionalEmbedder
      channels: ${model.net.channels}
      num_residue_pos: ${data.num_aa_max}
  smc_sampler:
    enabled: True
    langevin_eps: 1e-7
    num_timesteps: 100
    batch_size: 1024 # set for 48gb
    input_energy_cutoff: null # this might need tuning if you get NaNs!

data:
  batch_size: 10_000
  num_eval_samples: 10_000
