# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /data: 2aa
  - override /trainer: gpu

# ckpt_path: "/network/scratch/m/majdi.hassan/self-consume-bg/self-consume-bg/logs/train/runs/2aa_tarflow_noise_v3/checkpoints/last.ckpt"
ckpt_path: "/network/scratch/t/tanc/self-consume-bg/logs/train/runs/2aa_tarflow_v4/checkpoints/last.ckpt"
train: False
task_name: eval

model:
  sampling_config:
    use_com_adjustment: True
    batch_size: 10_000
    num_test_proposal_samples: 10_000
    num_smc_samples: 10_000
    clip_reweighting_logits: 0.002
  net:
    in_channels: 3
    channels: 384
    num_blocks: 6
    layers_per_block: 6
    cond_embed:
      _target_: src.models.components.tarflow.embed.ConditionalEmbedder
      channels: ${model.net.channels}
      num_residue_pos: ${data.num_aa_max}
  smc_sampler:
    enabled: True
    langevin_eps: 1e-7
    num_timesteps: 1000
    batch_size: 1024 # set for 48gb
    input_energy_cutoff: null # this might need tuning if you get NaNs!

data:
  batch_size: 10_000
  num_eval_samples: 10_000

trainer:
  limit_test_batches: 1
  limit_val_batches: 1
