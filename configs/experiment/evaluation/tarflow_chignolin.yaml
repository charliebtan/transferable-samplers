# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /data: chignolin

ckpt_path: "/network/scratch/b/bosejoey/fast-tbg/logs/train/runs/chignolin_tarflow_moonshot/checkpoints/last.ckpt"
train: False

model:
  sampling_config:
    batch_size: 1_024
    num_test_proposal_samples: 20_000
    num_smc_samples: 10_000
    clip_reweighting_logits: 0.002
  net:
    channels: 512
    num_blocks: 8
    layers_per_block: 8
  smc_sampler:
    langevin_eps: 1e-7
    num_timesteps: 100
    batch_size: 128 # set for 48gb
    enabled: True
    input_energy_cutoff: -100.0

  data:
    batch_size: 512
    num_eval_samples: 10_000
