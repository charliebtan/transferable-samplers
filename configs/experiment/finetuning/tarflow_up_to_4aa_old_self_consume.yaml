# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /data: up_to_4aa
  - override /trainer: gpu

initial_ckpt_path: "/network/scratch/m/majdi.hassan/self-consume-bg/logs/train/runs/tarflow_up_to_4aa_v2/checkpoints/last.ckpt"
ckpt_path: null
self_consume: True

model:
  eval_seq_name: null
  sampling_config:
    use_com_adjustment: True
    batch_size: 5_000
    num_proposal_samples: 10_000
    clip_reweighting_logits: 0.002
  net:
    _target_: src.models.components.tarflow.tarflow_old.TarFlow
    in_channels: 3
    channels: 384
    num_blocks: 8
    layers_per_block: 8
    use_qkln: True
    cond_embed:
      _target_: src.models.components.tarflow.embed.ConditionalEmbedder
      channels: ${model.net.channels}
  optimizer:
    lr: 1e-5
  smc_sampler:
    enabled: False
    
data:
  batch_size: 128
  num_eval_samples: 10_000
  buffer_ckpt_path: null
  buffer_ratio: 0.25
  buffer:
    _target_: src.data.components.buffer.ReplayBuffer
    max_length: 100_000
    sample_with_replacement: True

trainer:
  limit_train_batches: 500
  max_epochs: 100
  limit_test_batches: 1
  limit_val_batches: 1
  num_sanity_val_steps: 0
  check_val_every_n_epoch: 1
