# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /data: up_to_8aa
  - override /trainer: gpu

model:
  net:
    in_channels: 3
    channels: 512
    num_blocks: 8
    layers_per_block: 8
    cond_embed:
      _target_: src.models.components.tarflow.embed.ConditionalEmbedder
      channels: ${model.net.channels}
      num_residue_pos: ${data.num_aa_max}

  optimizer:
    lr: 1e-4
    weight_decay: 4e-4

  sampling_config:
    num_proposal_samples: 5_000

data:
  batch_size: 512
  com_augmentation: True
  num_eval_samples: 5_000

trainer:
  check_val_every_n_epoch: 50
  limit_train_batches: 1000
  limit_val_batches: 0.5 # it's quite slow otherwise - only affects val/loss
  limit_test_batches: 1.0
  max_epochs: 500
  num_sanity_val_steps: 1
