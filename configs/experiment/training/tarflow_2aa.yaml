# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /data: 2aa

model:
  transferable: true
  net:
    in_channels: 3
    channels: 256
    num_blocks: 6
    layers_per_block: 6
    conditional: ${model.transferable}
  optimizer:
    lr: 1e-4
    weight_decay: 4e-4

  sampling_config:
    num_proposal_samples: 5_000

data:
  batch_size: 256
  com_augmentation: True

trainer:
  check_val_every_n_epoch: 50
  max_epochs: 1_000
  num_sanity_val_steps: 1
