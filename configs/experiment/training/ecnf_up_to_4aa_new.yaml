# @package _global_

defaults:
  - override /model: flow_matching
  - override /data: up_to_4aa
  - override /trainer: gpu

model:
  net:
    channels: 256
    num_layers: 9
    encoding_dim: 4
    cond_embed:
      _target_: src.models.neural_networks.embed.AtomConditionalEmbedder
      hidden_dim: ${model.net.channels}
      output_dim: ${model.net.channels}
      sinusoid_div_value: 1000 # for sinusoidal positional embedding

  sampling_config:
    batch_size: 256
    num_proposal_samples: 1_000

data:
  batch_size: 512
  com_augmentation: False
  num_eval_samples: 5_000

trainer:
  check_val_every_n_epoch: 50
  limit_train_batches: 1000
  limit_val_batches: 0.5 # it's quite slow otherwise - only affects val/loss
  limit_test_batches: null
  max_epochs: 500
  num_sanity_val_steps: 0
