# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /data: 2aa
  - override /trainer: ddp

model:
  transferable: true
  net:
    in_channels: 3
    channels: 512
    num_blocks: 6
    layers_per_block: 6
    conditional: ${model.transferable}
  optimizer:
    lr: 1e-4
    weight_decay: 4e-4

  sampling_config:
    num_proposal_samples: 5_000

data:
  batch_size: 1024
  com_augmentation: True

trainer:
  check_val_every_n_epoch: 100000 # eval currently breaks training
  max_epochs: 1_000
  num_sanity_val_steps: 0 # eval currently breaks training
  strategy: ddp_find_unused_parameters_true