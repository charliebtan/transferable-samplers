# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /data: up_to_4aa
  - override /trainer: gpu

self_consume: True

model:
  net:
    in_channels: 3
    channels: 384
    num_blocks: 8
    layers_per_block: 8
    perm_type: "standard"
    pos_embed_type: "learned"
    cond_embed:
      _target_: src.models.components.tarflow.embed.ConditionalEmbedder
      channels: ${model.net.channels}

  optimizer:
    lr: 1e-4
    weight_decay: 4e-4

  sampling_config:
    num_proposal_samples: 5_000

data:
  batch_size: 512
  com_augmentation: True
  num_eval_samples: 5_000
  buffer_ckpt_path: null
  buffer_ratio: 0.5
  buffer:
    _target_: src.data.components.buffer.ReplayBuffer
    dim: 219 # number of RSCR atoms x 3
    max_length: 50_000
    sample_with_replacement: True

trainer:
  check_val_every_n_epoch: 1
  limit_train_batches: 1000
  limit_val_batches: 1 # it's quite slow otherwise - only affects val/loss
  limit_test_batches: null
  max_epochs: 30
  num_sanity_val_steps: 0
