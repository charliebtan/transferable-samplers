HIE:
  standard:
    # β-carbon group
    - CB        # β-carbon
    - HB2       # β-methylene hydrogen
    - HB3       # β-methylene hydrogen

    # γ-carbon (bridge to ring)
    - CG        # γ-carbon

    # Imidazole ring atoms (δ-protonated form)
    - ND1       # ring nitrogen (not protonated)
    - CE1       # ring carbon adjacent to ND1
    - HE1       # ring hydrogen on CE1
    - NE2       # ring nitrogen (protonated)
    - HE2       # hydrogen on NE2
    - CD2       # ring carbon between CG and NE2
    - HD2       # ring hydrogen on CD2

  ring_reverse:
    # β-carbon group
    - CB        # β-carbon
    - HB2       # β-methylene hydrogen
    - HB3       # β-methylene hydrogen

    # γ-carbon (bridge to ring)
    - CG        # γ-carbon

    # Imidazole ring atoms (δ-protonated form) - reversed order
    - CD2       # ring carbon
    - HD2       # ring hydrogen on CD2
    - NE2       # protonated ring nitrogen
    - HE2       # hydrogen on NE2
    - CE1       # ring carbon adjacent to ND1
    - HE1       # ring hydrogen on CE1
    - ND1       # ring nitrogen (not protonated)

